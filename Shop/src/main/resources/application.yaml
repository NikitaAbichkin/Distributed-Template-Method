server:
  port: 8080
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/shop_db
    username: shop_user
    password: shop_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true